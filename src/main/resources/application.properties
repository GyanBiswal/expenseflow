# Application
spring.application.name=expenseflow
server.port=8080

# Database — reads from environment variable if set, falls back to local default
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expenseflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:expenseuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:expensepass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:expenseflow-super-secret-key-for-jwt-signing-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Pagination
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

# Logging
logging.level.com.gyanbiswal.expenseflow=DEBUG